version: '3.8'

services:
  # CodeMCP 主应用
  codemcp:
    build: .
    container_name: codemcp
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/codemcp.db
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - codemcp_data:/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/status')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - codemcp_network

  # PostgreSQL 数据库 (可选，替代 SQLite)
  postgres:
    image: postgres:15-alpine
    container_name: codemcp_postgres
    environment:
      - POSTGRES_DB=codemcp
      - POSTGRES_USER=codemcp
      - POSTGRES_PASSWORD=codemcp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - codemcp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codemcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存 (可选，用于任务队列)
  redis:
    image: redis:7-alpine
    container_name: codemcp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - codemcp_network
    command: redis-server --appendonly yes

  # 数据库迁移服务 (一次性运行)
  migrations:
    build: .
    container_name: codemcp_migrations
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://codemcp:codemcp_password@postgres:5432/codemcp
    command: ["alembic", "upgrade", "head"]
    networks:
      - codemcp_network
    restart: "no"

  # 监控面板 (可选)
  monitoring:
    image: grafana/grafana:latest
    container_name: codemcp_monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - codemcp_network

  # 文档服务 (开发环境)
  docs:
    build: .
    container_name: codemcp_docs
    ports:
      - "8001:8000"
    command: ["mkdocs", "serve", "--dev-addr", "0.0.0.0:8000"]
    volumes:
      - ./doc:/app/doc
      - ./mkdocs.yml:/app/mkdocs.yml
    working_dir: /app
    restart: unless-stopped
    networks:
      - codemcp_network

volumes:
  codemcp_data:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  codemcp_network:
    driver: bridge